# authentik blueprint: groups, OAuth2 providers and applications for the
# "critical" services (Home Assistant, Paperless-ngx).
#
# Client IDs/secrets are injected into the authentik server+worker as env vars
# (from the SOPS secret authentik-oidc-credentials) and read here via !Env.
# ${EXTERNAL_DOMAIN}/${LOCAL_DOMAIN} are substituted by Flux postBuild.
version: 1
metadata:
  name: homelab-sso-critical
entries:
  # --- Groups ------------------------------------------------------------
  - model: authentik_core.group
    identifiers:
      name: homeassistant-admins
    attrs:
      name: homeassistant-admins

  # --- Home Assistant ----------------------------------------------------
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-home-assistant
    identifiers:
      name: home-assistant
    attrs:
      name: home-assistant
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: !Env HOMEASSISTANT_CLIENT_ID
      client_secret: !Env HOMEASSISTANT_CLIENT_SECRET
      grant_types:
        - authorization_code
        - refresh_token
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, authentik Self-signed Certificate],
        ]
      redirect_uris:
        - url: "https://homeassistant.${EXTERNAL_DOMAIN}/auth/oidc/callback"
          matching_mode: strict
        - url: "https://homeassistant.${LOCAL_DOMAIN}/auth/oidc/callback"
          matching_mode: strict
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: home-assistant
    attrs:
      name: Home Assistant
      slug: home-assistant
      provider: !KeyOf provider-home-assistant
      meta_launch_url: "https://homeassistant.${EXTERNAL_DOMAIN}"
      policy_engine_mode: any

  # --- Paperless-ngx -----------------------------------------------------
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-paperless
    identifiers:
      name: paperless
    attrs:
      name: paperless
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: !Env PAPERLESS_CLIENT_ID
      client_secret: !Env PAPERLESS_CLIENT_SECRET
      grant_types:
        - authorization_code
        - refresh_token
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, authentik Self-signed Certificate],
        ]
      redirect_uris:
        - url: "https://paperless.${EXTERNAL_DOMAIN}/accounts/oidc/authentik/login/callback/"
          matching_mode: strict
        - url: "https://paperless.${LOCAL_DOMAIN}/accounts/oidc/authentik/login/callback/"
          matching_mode: strict
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: paperless
    attrs:
      name: Paperless-ngx
      slug: paperless
      provider: !KeyOf provider-paperless
      meta_launch_url: "https://paperless.${EXTERNAL_DOMAIN}"
      policy_engine_mode: any
