apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 5m
  releaseName: authentik
  targetNamespace: authentik
  chart:
    spec:
      chart: authentik
      version: "2026.5.6"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: authentik-values
      valuesKey: values.yaml
