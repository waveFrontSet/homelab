apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - authentik-secret.sops.yaml
  - authentik-oidc-credentials.sops.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: authentik-values
    namespace: flux-system
    files:
      - values.yaml
  # Shared values for OIDC client apps, consumed via the authentik-client
  # Kustomize component (apps/components/authentik-client).
  - name: authentik-client-values
    namespace: flux-system
    files:
      - values.yaml=authentik-client-values.yaml
  - name: authentik-blueprints
    namespace: authentik
    files:
      - blueprints/homelab-uncritical.yaml
      - blueprints/homelab-critical.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled
