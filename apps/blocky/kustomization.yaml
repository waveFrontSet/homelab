apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: blocky-values
    namespace: flux-system
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
resources:
  - namespace.yaml
  - db-secret.sops.yaml
  - blocky-ui-secret.sops.yaml
  - helmrelease.yaml
