apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 5m
  releaseName: immich
  targetNamespace: immich
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
      valuesKey: values.yaml
