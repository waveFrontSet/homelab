controllers:
  webserver:
    type: deployment
    strategy: Recreate
    containers:
      app:
        image:
          repository: docker.io/homeassistant/home-assistant
          tag: 2026.7.1
        resources:
          requests:
            memory: 1Gi
            cpu: 500m
          limits:
            memory: 4Gi
            cpu: 1
        securityContext:
          privileged: true
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
              - SYS_ADMIN
        lifecycle:
          postStart:
            exec:
              command:
                - /bin/sh
                - -c
                - ln -sf /config-from-cm/configuration.yaml /config/configuration.yaml
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8123
              initialDelaySeconds: 0
              failureThreshold: 3
              timeoutSeconds: 1
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8123
              initialDelaySeconds: 0
              failureThreshold: 3
              timeoutSeconds: 1
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8123
              initialDelaySeconds: 0
              failureThreshold: 30
              timeoutSeconds: 1
              periodSeconds: 5
defaultPodOptions:
  nodeSelector:
    kubernetes.io/hostname: ontos
service:
  webserver:
    controller: webserver
    ports:
      http:
        port: 8123
ingress:
  webserver:
    className: traefik
    annotations:
      gethomepage.dev/description: Home automation
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Apps
      gethomepage.dev/icon: home-assistant.png
      gethomepage.dev/name: Homeassistant
      gethomepage.dev/app: webserver
      gethomepage.dev/pod-selector: ""
    hosts:
      - host: homeassistant.${EXTERNAL_DOMAIN}
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: webserver
              port: http
      - host: homeassistant.${LOCAL_DOMAIN}
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: webserver
              port: http
persistence:
  homeassistant-data:
    existingClaim: homeassistant-data
    globalMounts:
      - path: /config
  ha-configuration:
    type: configMap
    name: ha-configuration
    globalMounts:
      - path: /config-from-cm
  cache:
    type: emptyDir
    globalMounts:
      - path: /config/.cache
  deps:
    type: emptyDir
    globalMounts:
      - path: /config/deps
  tts:
    type: emptyDir
    globalMounts:
      - path: /config/tts
  backups:
    type: emptyDir
    globalMounts:
      - path: /config/backups
  zigbee:
    type: hostPath
    hostPath: /dev/serial/by-id/usb-Silicon_Labs_Sonoff_Zigbee_3.0_USB_Dongle_Plus_0001-if00-port0
    hostPathType: CharDevice
    globalMounts:
      - path: /dev/ttyUSB0
