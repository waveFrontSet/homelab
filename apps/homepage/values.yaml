controllers:
  homepage:
    type: deployment
    replicas: 1
    strategy: RollingUpdate
    revisionHistoryLimit: 3
    serviceAccount:
      identifier: homepage
    containers:
      app:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.13.1
        env:
          # MY_POD_IP must precede HOMEPAGE_ALLOWED_HOSTS so the $() ref resolves.
          # The pod IP entry is required by homepage for in-cluster health checks.
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: HOMEPAGE_ALLOWED_HOSTS
            value: "$(MY_POD_IP):3000,home.homelab"
serviceAccount:
  homepage:
    enabled: true
defaultPodOptions:
  automountServiceAccountToken: true
service:
  app:
    controller: homepage
    ports:
      http:
        port: 3000
ingress:
  app:
    annotations:
      gethomepage.dev/description: Dynamically Detected Homepage
      gethomepage.dev/enabled: "false"
      gethomepage.dev/group: Cluster Management
      gethomepage.dev/icon: homepage.png
      gethomepage.dev/name: Homepage
    hosts:
      - host: home.homelab
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
persistence:
  config:
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/custom.js
        subPath: custom.js
      - path: /app/config/custom.css
        subPath: custom.css
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
      - path: /app/config/docker.yaml
        subPath: docker.yaml
      - path: /app/config/kubernetes.yaml
        subPath: kubernetes.yaml
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
  logs:
    type: emptyDir
    globalMounts:
      - path: /app/config/logs
