apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../components/authentik-client
resources:
  - namespace.yaml
  - app-data.yaml
  - db-secret.sops.yaml
  - oidc-secret.sops.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: mealie-values
    namespace: flux-system
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled
