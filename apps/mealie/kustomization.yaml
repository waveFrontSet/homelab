apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - app-data.yaml
  - db-secret.sops.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: mealie-values
    namespace: flux-system
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
