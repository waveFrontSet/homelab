controllers:
  mealie:
    type: deployment
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/mealie-recipes/mealie
          tag: v3.20.1
        resources:
          requests:
            cpu: 20m
            memory: 384Mi
          limits:
            memory: 512Mi
        env:
          ALLOW_SIGNUP: "false"
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Berlin
          BASE_URL: https://mealie.${EXTERNAL_DOMAIN}
          DB_ENGINE: postgres
          POSTGRES_SERVER: cnpg-pooler-rw.cnpg-cluster.svc
          POSTGRES_PORT: "5432"
          POSTGRES_DB: mealiedb
          # authentik OIDC (client id/secret come from the oidc-secret envFrom)
          OIDC_AUTH_ENABLED: "true"
          OIDC_PROVIDER_NAME: authentik
          OIDC_CONFIGURATION_URL: https://authentik.${EXTERNAL_DOMAIN}/application/o/mealie/.well-known/openid-configuration
          OIDC_USER_CLAIM: email
          OIDC_SIGNUP_ENABLED: "true"
          OIDC_USER_GROUP: mealie-users
          OIDC_ADMIN_GROUP: mealie-admins
          OIDC_REMEMBER_ME: "true"
          # Keep the password form reachable during migration; flip on afterward.
          OIDC_AUTO_REDIRECT: "false"
        envFrom:
          - secretRef:
              name: db-secret
          - secretRef:
              name: oidc-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/app/about
                port: 9000
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/app/about
                port: 9000
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/app/about
                port: 9000
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 3
service:
  app:
    controller: mealie
    ports:
      http:
        port: 9000
ingress:
  app:
    className: traefik
    annotations:
      gethomepage.dev/description: Recipes
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Apps
      gethomepage.dev/icon: mealie.png
      gethomepage.dev/name: Mealie
      gethomepage.dev/app: mealie
      gethomepage.dev/pod-selector: ""
    hosts:
      - host: mealie.${EXTERNAL_DOMAIN}
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
      - host: mealie.homelab
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
persistence:
  data:
    existingClaim: mealie-app-data
    globalMounts:
      - path: /app/data
