apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: settings
    namespace: paperless
    envs:
      - paperless.env
  - name: paperless-values
    namespace: flux-system
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled
resources:
  - namespace.yaml
  - db-secret.sops.yaml
  - paperless-folder.yaml
  - helmrelease.yaml
