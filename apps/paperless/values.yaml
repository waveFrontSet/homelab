controllers:
  webserver:
    type: deployment
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/paperless-ngx/paperless-ngx
          tag: 2.20.15
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 2Gi
        envFrom:
          - configMapRef:
              name: settings
          - secretRef:
              name: paperless-db-secret
          - secretRef:
              name: paperless-oidc-secret
        env:
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: PAPERLESS_URL
            value: https://paperless.${EXTERNAL_DOMAIN}
          - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
            value: http://paperless.${LOCAL_DOMAIN},http://paperless.paperless.svc
          - name: PAPERLESS_ALLOWED_HOSTS
            value: "$(MY_POD_IP),paperless.${LOCAL_DOMAIN},paperless.paperless.svc"
          - name: PAPERLESS_CORS_ALLOWED_HOSTS
            value: http://paperless.${LOCAL_DOMAIN},http://paperless.paperless.svc
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8000
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8000
              initialDelaySeconds: 0
              failureThreshold: 3
              timeoutSeconds: 1
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8000
              initialDelaySeconds: 0
              failureThreshold: 30
              timeoutSeconds: 1
              periodSeconds: 5
    initContainers:
      redis:
        image:
          repository: redis
          tag: "8"
        restartPolicy: Always
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 48Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - redis-cli
                  - ping
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - redis-cli
                  - ping
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 3
service:
  webserver:
    controller: webserver
    ports:
      http:
        port: 8000
ingress:
  webserver:
    className: traefik
    annotations:
      gethomepage.dev/description: Document Management
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Apps
      gethomepage.dev/icon: paperless.png
      gethomepage.dev/name: Paperless
      gethomepage.dev/app: paperless
      gethomepage.dev/pod-selector: ""
    hosts:
      - host: paperless.${EXTERNAL_DOMAIN}
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: webserver
              port: http
      - host: paperless.homelab
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: webserver
              port: http
persistence:
  data:
    existingClaim: paperless-data
    advancedMounts:
      webserver:
        app:
          - path: /usr/src/paperless/data
            subPath: data
          - path: /usr/src/paperless/export
            subPath: export
  consume:
    type: nfs
    server: ${NAS_IP}
    path: /mnt/Personal/Dokumente/paperless-eingang
    advancedMounts:
      webserver:
        app:
          - path: /usr/src/paperless/consume
  media:
    type: nfs
    server: ${NAS_IP}
    path: /mnt/Personal/Dokumente/paperless-media
    advancedMounts:
      webserver:
        app:
          - path: /usr/src/paperless/media
