apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: kube-prometheus-values
    files:
      - values.yaml
resources:
  - namespace.yaml
  - grafana-admin-secret.sops.yaml
  - helmrepo.yaml
  - helmrelease.yaml
  - dashboard-ah-lcg.sops.yaml
  - datasource-scrapydb.yaml
  - scrapy-grafana-secret.sops.yaml
patches:
  # Grafana dashboard JSON contains ${var} template tokens that collide with
  # Flux postBuild envsubst. Opt this ConfigMap out of substitution.
  - target:
      kind: ConfigMap
      name: grafana-dashboard-ah-lcg-price-tracker
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-dashboard-ah-lcg-price-tracker
        annotations:
          kustomize.toolkit.fluxcd.io/substitute: disabled
