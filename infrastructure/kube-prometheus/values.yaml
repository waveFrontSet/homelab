grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # Pin authentik's hostname to the Traefik LB IP so Grafana's server-side OIDC
  # calls stay on the LAN (mirrors blocky). Not app-template, so it can't use
  # the authentik-client component.
  hostAliases:
    - ip: 192.168.2.18
      hostnames:
        - authentik.${EXTERNAL_DOMAIN}
  envFromSecret: scrapy-grafana
  # authentik OIDC client id/secret (read by Grafana as [auth.generic_oauth])
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-oauth
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
  grafana.ini:
    server:
      root_url: https://grafana.${EXTERNAL_DOMAIN}
    auth:
      oauth_allow_insecure_email_lookup: true
      oauth_auto_login: true
      signout_redirect_url: https://authentik.${EXTERNAL_DOMAIN}/application/o/grafana/end-session/
    auth.generic_oauth:
      enabled: true
      name: authentik
      scopes: openid email profile
      auth_url: https://authentik.${EXTERNAL_DOMAIN}/application/o/authorize/
      token_url: https://authentik.${EXTERNAL_DOMAIN}/application/o/token/
      api_url: https://authentik.${EXTERNAL_DOMAIN}/application/o/userinfo/
      # Map authentik group membership (groups claim) to Grafana roles.
      role_attribute_path: contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || 'Viewer'
  service:
    type: LoadBalancer
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      gethomepage.dev/description: Dashboards & Monitoring
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Infrastructure
      gethomepage.dev/icon: grafana.png
      gethomepage.dev/name: Grafana
      gethomepage.dev/app: grafana
      gethomepage.dev/pod-selector: ""
    hosts:
      - grafana.${EXTERNAL_DOMAIN}
      - grafana.homelab
    path: /
  persistence:
    enabled: true
    type: sts
    storageClassName: "longhorn"
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    finalizers:
      - kubernetes.io/pvc-protection
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "12GB"
    scrapeInterval: "60s"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-no-backup
          resources:
            requests:
              storage: 15Gi
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-no-backup
          resources:
            requests:
              storage: 2Gi
