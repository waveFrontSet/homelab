grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  envFromSecret: scrapy-grafana
  service:
    type: LoadBalancer
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      gethomepage.dev/description: Dashboards & Monitoring
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: Infrastructure
      gethomepage.dev/icon: grafana.png
      gethomepage.dev/name: Grafana
      gethomepage.dev/app: grafana
      gethomepage.dev/pod-selector: ""
    hosts:
      - grafana.${EXTERNAL_DOMAIN}
      - grafana.homelab
    path: /
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "12GB"
    scrapeInterval: "60s"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-no-backup
          resources:
            requests:
              storage: 15Gi
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-no-backup
          resources:
            requests:
              storage: 2Gi
