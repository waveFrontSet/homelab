apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: scrapydb
  namespace: cnpg-cluster
spec:
  name: scrapydb
  owner: scrapy
  cluster:
    name: cnpg-cluster
  extensions:
    - name: vector
      ensure: present
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: paperlessdb
  namespace: cnpg-cluster
spec:
  name: paperlessdb
  owner: paperless
  cluster:
    name: cnpg-cluster
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: blockydb
  namespace: cnpg-cluster
