---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: immichdb
  namespace: cnpg-cluster
spec:
  name: immichdb
  owner: immich
  cluster:
    name: cnpg-cluster
  extensions:
    - name: vector
      ensure: present
    - name: cube
      ensure: present
    - name: earthdistance
      ensure: present
