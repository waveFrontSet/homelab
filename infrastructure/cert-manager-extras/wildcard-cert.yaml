---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-external
  namespace: traefik
spec:
  secretName: wildcard-external-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  commonName: "*.${EXTERNAL_DOMAIN}"
  dnsNames:
    - "*.${EXTERNAL_DOMAIN}"
    - "${EXTERNAL_DOMAIN}"
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
